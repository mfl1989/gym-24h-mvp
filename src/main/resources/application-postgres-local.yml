spring:
  config:
    activate:
      on-profile: postgres-local
  datasource:
    url: jdbc:postgresql://localhost:5432/gym24h_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC
        "[format_sql]": true
        "[use_sql_comments]": true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/gym24h_db
    user: postgres
    password: postgres