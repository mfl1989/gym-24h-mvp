spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gym24h_db
    username: postgres
    password: ${DB_PASSWORD:YOUR_POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": true
        "[use_sql_comments]": true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/gym24h_db
    user: postgres
    password: ${DB_PASSWORD:YOUR_POSTGRES_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms

  jackson:
    time-zone: UTC

server:
  shutdown: graceful

stripe:
  api:
    secret-key: ${STRIPE_API_SECRET_KEY:YOUR_STRIPE_API_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:YOUR_STRIPE_WEBHOOK_SECRET}

logging:
  level:
    root: info
    "[com.gym24h]": info
    "[org.hibernate.SQL]": debug
    "[org.hibernate.orm.jdbc.bind]": trace
