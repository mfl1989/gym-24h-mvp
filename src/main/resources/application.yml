spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gym24h_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC
        "[format_sql]": true
        "[use_sql_comments]": true
  flyway:
    enabled: true
    baseline-on-migrate: true
    # clean-on-validation-error: true  # <--- 就是这句“炸毁重建”的魔法！
    # clean-disabled: false
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/gym24h_db
    user: postgres
    password: postgres
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      repositories:
        enabled: false

  jackson:
    time-zone: UTC

server:
  shutdown: graceful

door-lock:
  api-url: ${DOOR_LOCK_API_URL:http://localhost:8081/mock/door-lock/unlock}

app:
  admin:
    secret: ${APP_ADMIN_SECRET:super-secret-admin-key}

line:
  channel-id: ${LINE_CHANNEL_ID:YOUR_LINE_CHANNEL_ID}

stripe:
  api:
    secret-key: ${STRIPE_API_SECRET_KEY:YOUR_STRIPE_API_SECRET_KEY}
  checkout:
    success-url: ${STRIPE_CHECKOUT_SUCCESS_URL:http://localhost:3000/success?session_id={CHECKOUT_SESSION_ID}}
    cancel-url: ${STRIPE_CHECKOUT_CANCEL_URL:http://localhost:3000/cancel}
  reconciliation:
    lookback-hours: ${STRIPE_RECONCILIATION_LOOKBACK_HOURS:24}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:YOUR_STRIPE_WEBHOOK_SECRET}

security:
  jwt:
    auth-secret: ${JWT_AUTH_SECRET:dev-auth-secret-32chars-minimum-length-value}
    issuer: ${JWT_AUTH_ISSUER:gym24h-auth}
    auth-ttl-seconds: ${JWT_AUTH_TTL_SECONDS:3600}
  qr:
    secret: ${QR_TOKEN_SECRET:dev-qr-secret-32chars-minimum-length-value!!}
    issuer: ${QR_TOKEN_ISSUER:gym24h-qr}
    ttl-seconds: ${QR_TOKEN_TTL_SECONDS:30}

logging:
  level:
    root: info
    "[com.gym24h]": info
    "[org.hibernate.SQL]": debug
    "[org.hibernate.orm.jdbc.bind]": trace
