spring:
  datasource:
    url: jdbc:h2:mem:gym24h-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    url: jdbc:h2:mem:gym24h-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    user: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 100ms
      repositories:
        enabled: false

security:
  jwt:
    auth-secret: test-auth-secret-32chars-minimum-length-value
    issuer: gym24h-auth
    auth-ttl-seconds: 3600
  qr:
    secret: test-qr-secret-32chars-minimum-length-value!!
    issuer: gym24h-qr
    ttl-seconds: 30

stripe:
  api:
    secret-key: sk_test_dummy_secret
  checkout:
    success-url: http://localhost:3000/success?session_id={CHECKOUT_SESSION_ID}
    cancel-url: http://localhost:3000/cancel
  reconciliation:
    lookback-hours: 24
  webhook:
    secret: whsec_test_secret_for_integration


